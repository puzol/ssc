<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSC</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="phone-container"> <!-- For Desktop View, irelevant on phone -->
      <div class="player" id="player1">
        <div class="player-header">
          <div class="player-name">
            Player 1
          </div>
          <div class="player-score">
            000
          </div>
        </div>
        <div class="player-body">
          <div class="scored">
            <div class="scored-label">
              Scored:
            </div>
            <div class="scored-values">
              <div class="button score-value red" data-value="1">
                +1
              </div>
              <div class="button score-value yellow" data-value="2">
                +2
              </div>
              <div class="button score-value green" data-value="3">
                +3
              </div>
              <div class="button score-value brown" data-value="4">
                +4
              </div>
              <div class="button score-value blue" data-value="5">
                +5
              </div>
              <div class="button score-value pink" data-value="6">
                +6
              </div>
              <div class="button score-value black" data-value="7">
                +7
              </div>
            </div>
          </div>
          <div class="foul">
            <div class="foul-label">
              Foul:
            </div>
            <div class="foul-values">
              <div class="button foul-value white" data-value="4">
                +4
              </div>
              <div class="button foul-value blue" data-value="5">
                +5
              </div>
              <div class="button foul-value pink" data-value="6">
                +6
              </div>
              <div class="button foul-value black" data-value="7">
                +7
              </div>
            </div>
          </div>
          <div class="undo-wrap">
            <button class="undo-button">
              Undo
            </button>
            <button class="redo-button">
              Redo
            </button>
          </div>
        </div>
      </div>

      <div class="player" id="player2">
        <div class="player-header">
          <div class="player-name">
            Player 2
          </div>
          <div class="player-score">
            000
          </div>
        </div>
        <div class="player-body">
          <div class="scored">
            <div class="scored-label">
              Scored:
            </div>
            <div class="scored-values">
              <div class="button score-value red" data-value="1">
                +1
              </div>
              <div class="button score-value yellow" data-value="2">
                +2
              </div>
              <div class="button score-value green" data-value="3">
                +3
              </div>
              <div class="button score-value brown" data-value="4">
                +4
              </div>
              <div class="button score-value blue" data-value="5">
                +5
              </div>
              <div class="button score-value pink" data-value="6">
                +6
              </div>
              <div class="button score-value black" data-value="7">
                +7
              </div>
            </div>
          </div>
          <div class="foul">
            <div class="foul-label">
              Foul:
            </div>
            <div class="foul-values">
              <div class="button foul-value white" data-value="4">
                +4
              </div>
              <div class="button foul-value blue" data-value="5">
                +5
              </div>
              <div class="button foul-value pink" data-value="6">
                +6
              </div>
              <div class="button foul-value black" data-value="7">
                +7
              </div>
            </div>
          </div>
          <div class="undo-wrap">
            <button class="undo-button">
              Undo
            </button>
            <button class="redo-button">
              Redo
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js" defer></script>
  </body>
</html>
